apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-redis
  namespace: argocd
spec:
  project: default
  source:
    chart: redis
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 18.6.1
    helm:
      values: |
        architecture: standalone
        auth:
          enabled: true
          password: "123456"
        master:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi 
          persistence:
            enabled: true
            size: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: shoeshop-data 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true